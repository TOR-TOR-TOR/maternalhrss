{% extends "base.html" %}
{% block title %}{{ form_title }}{% endblock %}
{% block page_heading %}{{ form_title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
  <div class="page-card">
    <h2 class="font-display font-semibold text-xl text-gray-800 mb-6">{{ form_title }}</h2>

    <form method="post" novalidate>
      {% csrf_token %}
      {% include "users/_form_fields.html" with form=form %}

      <div class="flex items-center gap-3 mt-6 pt-4 border-t border-gray-100">
        <button type="submit"
          class="btn text-white border-0 shadow-sm px-6 rounded-xl"
          style="background:#0f6b4f">
          Save
        </button>
        <a href="{% url 'users:user_list' %}" class="btn btn-ghost rounded-xl px-6">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
